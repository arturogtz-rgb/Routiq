# Routiq — Nginx reverse proxy + SPA static
# Este archivo se copia a /etc/nginx/sites-available/routiq.com.mx.conf
# y se enlaza desde sites-enabled/.
# Certbot añadirá automáticamente las directivas SSL al ejecutar `certbot --nginx`.

# ---- HTTP redirect a HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name routiq.com.mx www.routiq.com.mx api.routiq.com.mx;

    # Permitir el challenge ACME de certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Por defecto certbot redirige a HTTPS tras correr `certbot --nginx --redirect`
    # Pero dejamos un fallback en caso de que aún no haya SSL:
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS principal: routiq.com.mx + www ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name routiq.com.mx www.routiq.com.mx;

    # Las directivas ssl_certificate las pondrá certbot.
    # ssl_certificate /etc/letsencrypt/live/routiq.com.mx/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/routiq.com.mx/privkey.pem;

    # Redirige www → apex (solo dominio limpio en SEO)
    if ($host = www.routiq.com.mx) {
        return 301 https://routiq.com.mx$request_uri;
    }

    # Logs específicos
    access_log /var/log/nginx/routiq.access.log;
    error_log  /var/log/nginx/routiq.error.log;

    # Tamaño máximo body (PDF uploads, imágenes de logos)
    client_max_body_size 25M;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS la activa certbot

    # ----- API → backend FastAPI (Docker) -----
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts altos para PDFs grandes
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # No bufferear (mejor streaming de PDF)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ----- Service Worker — DEBE servirse desde la raíz, sin cache -----
    location = /service-worker.js {
        root /var/www/routiq;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ----- Manifest PWA -----
    location = /manifest.json {
        root /var/www/routiq;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ----- Assets estáticos con cache largo -----
    location /static/ {
        root /var/www/routiq;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # ----- SPA React: todo lo demás cae en index.html -----
    location / {
        root /var/www/routiq;
        try_files $uri $uri/ /index.html;
        index index.html;
        # No cachear el index para que el SW siempre vea la última versión
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# ---- HTTPS api.routiq.com.mx (alias del /api/ — útil si en el futuro
# queremos consumirlo como subdominio o desde apps móviles externas). ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.routiq.com.mx;

    # ssl_certificate / key los pone certbot.

    access_log /var/log/nginx/routiq.api.access.log;
    error_log  /var/log/nginx/routiq.api.error.log;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
