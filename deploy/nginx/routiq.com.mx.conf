# Routiq — Nginx (configuración inicial HTTP)
# El script 04-ssl-setup.sh ejecuta `certbot --nginx --redirect` que automáticamente
# añade los bloques HTTPS, certificados y redirección 80→443 a este archivo.

server {
    listen 80;
    listen [::]:80;
    server_name routiq.com.mx www.routiq.com.mx api.routiq.com.mx;

    access_log /var/log/nginx/routiq.access.log;
    error_log  /var/log/nginx/routiq.error.log;

    client_max_body_size 25M;

    # Headers de seguridad básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS la activa certbot al pasarle --redirect

    # ----- API → backend FastAPI (Docker) -----
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ----- Service Worker — DEBE servirse desde la raíz, sin cache -----
    location = /service-worker.js {
        root /var/www/routiq;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ----- Manifest PWA -----
    location = /manifest.json {
        root /var/www/routiq;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ----- Assets estáticos con cache largo -----
    location /static/ {
        root /var/www/routiq;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # ----- SPA React: todo lo demás cae en index.html -----
    location / {
        root /var/www/routiq;
        try_files $uri $uri/ /index.html;
        index index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
