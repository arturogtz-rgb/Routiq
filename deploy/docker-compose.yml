name: routiq

services:
  mongo:
    image: mongo:7
    container_name: routiq-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - mongo_backups:/backups
    networks:
      - routiq_net
    # No exponemos el puerto al exterior; solo accesible dentro de la red Docker.
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: routiq-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: ${MONGO_URL}
      DB_NAME: ${DB_NAME}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      DEMO_COMPANY_ADMIN_EMAIL: ${DEMO_COMPANY_ADMIN_EMAIL}
      DEMO_COMPANY_ADMIN_PASSWORD: ${DEMO_COMPANY_ADMIN_PASSWORD}
      DEMO_EXECUTIVE_EMAIL: ${DEMO_EXECUTIVE_EMAIL}
      DEMO_EXECUTIVE_PASSWORD: ${DEMO_EXECUTIVE_PASSWORD}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}
      PUBLIC_LOGIN_URL: ${PUBLIC_LOGIN_URL}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      BAILEYS_URL: http://baileys:3001
      BAILEYS_SHARED_SECRET: ${BAILEYS_SHARED_SECRET}
      BACKUP_DIR: /backups
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE}
      APP_SETTINGS_URL: ${APP_SETTINGS_URL}
    volumes:
      - uploads_data:/app/uploads
      # Backups de MongoDB en SOLO LECTURA, para descargarlos desde el Panel Master
      - mongo_backups:/backups:ro
    ports:
      # Solo expone a la red local del host. Nginx en el host hace el proxy a este puerto.
      - "127.0.0.1:8001:8000"
    networks:
      - routiq_net
    deploy:
      resources:
        limits:
          memory: 768M

  baileys:
    build:
      context: ../baileys-service
      dockerfile: Dockerfile
    container_name: routiq-baileys
    restart: unless-stopped
    environment:
      PORT: "3001"
      BAILEYS_SHARED_SECRET: ${BAILEYS_SHARED_SECRET}
      # El backend escucha en el puerto 8000 DENTRO de la red Docker (el 8001 es el mapeo al host)
      WEBHOOK_URL: http://backend:8000
      AUTH_DIR: /data/auth
    volumes:
      - baileys_auth:/data/auth
    networks:
      - routiq_net
    # Sin "ports": queda accesible SOLO dentro de la red interna (privado).
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mongo_data:
    name: routiq_mongo_data
  mongo_backups:
    name: routiq_mongo_backups
  uploads_data:
    name: routiq_uploads
  baileys_auth:
    name: routiq_baileys_auth

networks:
  routiq_net:
    name: routiq_net
    driver: bridge
